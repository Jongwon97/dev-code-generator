<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontend Generator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --surface3:#2d333b;
  --border:#30363d; --text:#cdd9e5; --muted:#768390;
  --primary:#316dca; --primary-h:#388bfd;
  --green:#57ab5a; --red:#f47067; --yellow:#e3b341; --teal:#38bdf8;
  --xml-tag:#f47067; --xml-attr:#6cb6ff; --xml-val:#96d0ff;
  --radius:6px;
}
[data-theme="light"] {
  --bg:#ffffff; --surface:#f8f9fb; --surface2:#f1f4f7; --surface3:#ffffff;
  --border:#cdd3da; --text:#1f2328; --muted:#636d79;
  --primary:#0969da; --primary-h:#0550ae;
  --green:#1a7f37; --red:#cf222e; --yellow:#9a6700; --teal:#0284c7;
  --xml-tag:#cf222e; --xml-attr:#0969da; --xml-val:#0550ae;
}
body { font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
header h1 { font-size:1.1rem; font-weight:700; }
.logo { color:var(--teal); }
.sub  { color:var(--muted); font-weight:400; }
.hdr-actions { margin-left:auto; }

.layout { display:grid; grid-template-columns:380px 1fr; flex:1; overflow:hidden; }

/* ── LEFT ── */
.left-panel { display:flex; flex-direction:column; overflow:hidden; border-right:1px solid var(--border); background:var(--surface2); }
.panel-hdr  { padding:7px 14px; font-size:.7rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.left-body  { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:14px; }

.section       { display:flex; flex-direction:column; gap:6px; }
.section-label { font-size:.68rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }
.section-box   { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:11px 12px; display:flex; flex-direction:column; gap:8px; }

.field       { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:.78rem; font-weight:600; color:var(--text); }

input[type=text], textarea, select {
  background:var(--surface3); border:1px solid var(--border); border-radius:5px;
  color:var(--text); font-family:inherit; font-size:.82rem; padding:5px 8px;
  width:100%; transition:border-color .15s;
}
input:focus, textarea:focus, select:focus {
  outline:none; border-color:var(--primary-h); box-shadow:0 0 0 2px rgba(56,139,253,.15);
}
input::placeholder, textarea::placeholder { color:var(--muted); }
textarea { resize:vertical; font-family:'Consolas','Fira Code',monospace; font-size:.79rem; line-height:1.55; }

.check-row { display:flex; align-items:center; gap:6px; }
.check-row input[type=checkbox] { width:13px; height:13px; accent-color:var(--primary-h); cursor:pointer; flex-shrink:0; }
.check-row label { font-size:.8rem; color:var(--text); cursor:pointer; }
.checks-inline { display:flex; gap:14px; flex-wrap:wrap; }
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:6px; cursor:pointer; font-family:inherit; font-weight:600; font-size:.82rem; padding:7px 14px; transition:all .13s; }
.btn:active { transform:scale(.97); }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-h); }
.btn-gen { background:linear-gradient(135deg,#0369a1,#316dca); color:#fff; font-size:.88rem; padding:9px; width:100%; }
.btn-gen:hover { filter:brightness(1.1); }
.btn-ghost  { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover  { background:var(--surface3); }
.btn-copy   { background:rgba(87,171,90,.15); color:var(--green); border:1px solid rgba(87,171,90,.3); font-size:.75rem; padding:4px 10px; }
.btn-copy:hover   { background:rgba(87,171,90,.25); }
.btn-danger { background:rgba(244,112,103,.1); color:var(--red); border:1px solid rgba(244,112,103,.2); }
.btn-danger:hover { background:rgba(244,112,103,.2); }
.btn-xs     { padding:3px 8px; font-size:.72rem; }
.btn-icon   { padding:2px 6px; font-size:.75rem; width:22px; height:22px; }

/* ── RIGHT ── */
.right-panel { display:flex; flex-direction:column; overflow:hidden; }

.table-section { flex:0 0 52%; display:flex; flex-direction:column; overflow:hidden; border-bottom:2px solid var(--border); }
.sec-hdr { padding:6px 12px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
.sec-hdr-title { font-size:.68rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; flex:1; }
.table-wrap { flex:1; overflow:auto; }

table.ct { width:100%; border-collapse:collapse; font-size:.77rem; white-space:nowrap; table-layout:auto; }
table.ct th {
  position:sticky; top:0; z-index:1;
  background:var(--surface); border-bottom:2px solid var(--border);
  padding:5px 6px; font-size:.75rem; font-weight:700; color:var(--muted); text-align:center;
}
table.ct td { padding:2px 3px; border-bottom:1px solid var(--border); vertical-align:middle; }
table.ct tr:hover td { background:rgba(255,255,255,.02); }
table.ct input[type=text] { padding:2px 5px; font-size:.77rem; }
table.ct select          { padding:2px 3px; font-size:.77rem; }
table.ct input[type=checkbox] { width:13px; height:13px; accent-color:var(--primary-h); cursor:pointer; display:block; margin:auto; }

td.tn  { text-align:center; color:var(--muted); font-size:.68rem; width:16px; }
td.tdl { width:16px; text-align:center; }
td.ttag { width:94px; }
td.thdr { min-width:80px; }
td.tfld { min-width:85px; }
td.tw   { width:50px; }
td.tal  { width:40px; max-width:40px; overflow:hidden; }
td.tal select { width:100%; max-width:100%; box-sizing:border-box; }
td.tck  { width:34px; text-align:center; }
td.tit  { width:50px; }
td.tdt  { width:72px; }
td.tft  { width:80px; }
td.tvf  { width:90px; }

.dash { color:var(--muted); display:block; text-align:center; }

/* ── OUTPUT ── */
.output-section { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.output-wrap    { flex:1; overflow:auto; padding:12px 16px; }
.output-wrap pre { font-family:'Consolas','Fira Code','D2Coding',monospace; font-size:.79rem; line-height:1.7; white-space:pre; }
.xt { color:var(--xml-tag); }
.xa { color:var(--xml-attr); }
.xv { color:var(--xml-val); }
.xp { color:var(--muted); }

.out-tab { padding:3px 12px; border-radius:5px; font-size:.72rem; font-weight:700; cursor:pointer; color:var(--muted); border:1px solid transparent; transition:all .13s; white-space:nowrap; }
.out-tab:hover { color:var(--text); }
.out-tab.active { background:var(--surface3); color:var(--text); border-color:var(--border); }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }
</style>
</head>
<body>

<header>
  <h1><span class="logo">Frontend</span> <span class="sub">Generator</span></h1>
  <div class="hdr-actions" style="display:flex;gap:8px;align-items:center">
    <button class="btn btn-ghost btn-xs" onclick="loadSample()">샘플 불러오기</button>
    <button class="btn btn-ghost btn-xs" onclick="resetAll()">초기화</button>
  </div>
</header>

<div class="layout">

  <!-- ── LEFT PANEL ── -->
  <div class="left-panel">
    <div class="panel-hdr">입력</div>
    <div class="left-body">

      <div class="section">
        <div class="section-label">모듈명</div>
        <div class="section-box">
          <div class="field">
            <label>Module Name</label>
            <input type="text" id="inp-module">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">컬럼 입력 <span style="text-transform:none;font-weight:400;letter-spacing:0">(줄 구분, 순서 일치)</span></div>
        <div class="section-box">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="field">
              <label>data-field</label>
              <textarea id="inp-fields" rows="9"
               
                style="height:188px"></textarea>
            </div>
            <div class="field">
              <label>header-text</label>
              <textarea id="inp-headers" rows="9"
               
                style="height:188px"></textarea>
            </div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-primary" style="flex:1" onclick="parseInput()">⬇ 파싱</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">공통 코드 <span style="text-transform:none;font-weight:400;letter-spacing:0">(줄 구분, 순서 일치)</span></div>
        <div class="section-box">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="field">
              <label>코드</label>
              <textarea id="inp-codes"
               
                style="height:80px"
                oninput="parseCodes()"></textarea>
            </div>
            <div class="field">
              <label>주석</label>
              <textarea id="inp-code-comments"
               
                style="height:80px"
                oninput="parseCodes()"></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Toolbar 버튼</div>
        <div class="section-box">
          <div class="checks-inline">
            <div class="check-row"><input type="checkbox" id="tb-add"  checked><label for="tb-add">추가<span style="color:var(--muted);font-size:.75rem">(onAdd)</span></label></div>
            <div class="check-row"><input type="checkbox" id="tb-del"  checked><label for="tb-del">삭제<span style="color:var(--muted);font-size:.75rem">(onDelete)</span></label></div>
            <div class="check-row"><input type="checkbox" id="tb-save" checked><label for="tb-save">저장<span style="color:var(--muted);font-size:.75rem">(onSave)</span></label></div>
          </div>
        </div>
      </div>

      <button class="btn btn-gen" onclick="generate()">⚡ 코드 생성 (Ctrl+Enter)</button>

    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel">

    <!-- COLUMN TABLE -->
    <div class="table-section">
      <div class="sec-hdr">
        <span class="sec-hdr-title">컬럼 설정</span>
<button class="btn btn-ghost btn-xs" onclick="addCol()">+ 추가</button>
      </div>
      <div class="table-wrap">
        <table class="ct" id="col-table">
          <thead>
            <tr>
              <th style="width:10px">#</th>
              <th style="width:10px">삭제</th>
              <th style="width:34px">검색</th>
              <th style="width:41px">tag type</th>
              <th style="width:100px">header-text</th>
              <th style="width:100px">data-field</th>
              <th style="width:20px">width</th>
              <th style="width:20px">text-align</th>
              <th style="width:20px">items</th>
              <th style="width:14px">editable</th>
              <th style="width:14px">required</th>
            </tr>
          </thead>
          <tbody id="col-tbody">
            <tr><td colspan="11" style="text-align:center;padding:20px;color:var(--muted);font-size:.79rem">컬럼 입력 후 파싱 버튼을 클릭하세요</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="output-section">
      <div class="sec-hdr">
        <span class="sec-hdr-title">출력 결과</span>
        <button class="btn btn-copy" onclick="copyOutput()">복사</button>
      </div>
      <div style="padding:5px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:2px">
        <div class="out-tab" onclick="switchOutTab('em',this)">em</div>
        <div class="out-tab active" onclick="switchOutTab('list',this)">list</div>
        <div class="out-tab" onclick="switchOutTab('detail',this)">detail</div>
        <div class="out-tab" onclick="switchOutTab('popup',this)">popup</div>
      </div>
      <div class="output-wrap">
        <div id="out-em" style="display:none">
          <pre id="out-em-pre" style="color:var(--muted);font-style:italic">코드 생성 버튼을 클릭하세요...</pre>
        </div>
        <div id="out-list">
          <pre id="out-list-pre" style="color:var(--muted);font-style:italic">코드 생성 버튼을 클릭하세요...</pre>
        </div>
        <div id="out-detail" style="display:none">
          <pre id="out-detail-pre" style="color:var(--muted);font-style:italic">코드 생성 버튼을 클릭하세요...</pre>
        </div>
        <div id="out-popup" style="display:none">
          <pre id="out-popup-pre" style="color:var(--muted);font-style:italic">코드 생성 버튼을 클릭하세요...</pre>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let cols = [];
let codes = [];
let codeComments = [];

/* ── THEME ── */
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'devgen-theme') {
    document.documentElement.setAttribute('data-theme', e.data.theme);
  }
});
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { generate(); e.preventDefault(); }
});

/* ── DATA MODEL ── */
function mkCol(dataField = '', headerText = '', tag = 'sc-data-column') {
  return {
    tag, headerText, dataField,
    width: '100', editable: false, textAlign: 'center', required: false,
    items: '', search: false,
  };
}

/* ── PARSE CODES ── */
function parseCodes() {
  const codeVal = document.getElementById('inp-codes').value.trim();
  const commVal = document.getElementById('inp-code-comments').value.trim();
  codes        = codeVal ? codeVal.split('\n').map(l => l.trim()).filter(Boolean) : [];
  codeComments = commVal ? commVal.split('\n').map(l => l.trim()) : [];
  renderTable();
}

/* ── PARSE INPUT ── */
function parseInput() {
  const fields  = document.getElementById('inp-fields').value.trim();
  const headers = document.getElementById('inp-headers').value.trim();
  if (!fields) return;
  const fLines = fields.split('\n').map(l => l.trim()).filter(Boolean);
  const hLines = headers.split('\n').map(l => l.trim());
  cols = fLines.map((f, i) => mkCol(f, hLines[i] ?? ''));
  renderTable();
}

function clearCols() { cols = []; renderTable(); }

function addCol() {
  cols.push(mkCol());
  renderTable();
  document.querySelector('.table-wrap').scrollTop = 9999;
}

function deleteCol(i) {
  cols.splice(i, 1);
  document.getElementById('inp-fields').value  = cols.map(c => c.dataField).join('\n');
  document.getElementById('inp-headers').value = cols.map(c => c.headerText).join('\n');
  renderTable();
}

function upd(i, key, val)  { cols[i][key] = val; }
function updTag(i, val)    { cols[i].tag = val; if (val === 'sc-combobox-column') cols[i].textAlign = 'center'; renderTable(); }
function updBool(i, key, v){ cols[i][key] = v; }

/* ── RENDER TABLE ── */
function renderTable() {
  const tbody = document.getElementById('col-tbody');
  if (!cols.length) {
    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--muted);font-size:.79rem">컬럼을 추가하거나 파싱하세요</td></tr>';
    return;
  }
  const TAGS = [
    ['sc-data-column',    'sc-data-column'],
    ['sc-combobox-column','sc-combobox-column'],
    ['sc-date-column',    'sc-date-column'],
    ['sc-data-field',     'sc-data-field (숨김)'],
  ];
  const ALIGNS = ['center','left','right'];

  tbody.innerHTML = cols.map((c, i) => {
    const isCombo = c.tag === 'sc-combobox-column';
    const isDate  = c.tag === 'sc-date-column';
    const isField = c.tag === 'sc-data-field';

    const tagSel = `<select onchange="updTag(${i},this.value)">${
      TAGS.map(([v,l]) => `<option value="${v}"${c.tag===v?' selected':''}>${l}</option>`).join('')
    }</select>`;

    const hdrInp = isField ? '<span class="dash">—</span>'
      : `<input type="text" value="${xe(c.headerText)}" oninput="upd(${i},'headerText',this.value)">`;

    const fldInp = `<input type="text" value="${xe(c.dataField)}" oninput="upd(${i},'dataField',this.value)">`;

    const widInp = isField ? '<span class="dash">—</span>'
      : `<input type="text" value="${xe(c.width)}" oninput="upd(${i},'width',this.value)">`;

    const alSel = (isField || isDate || isCombo) ? '<span class="dash">—</span>'
      : `<select onchange="upd(${i},'textAlign',this.value)">${
          ALIGNS.map(v=>`<option${c.textAlign===v?' selected':''}>${v}</option>`).join('')
        }</select>`;

    const edChk = isField ? '<span class="dash">—</span>'
      : `<input type="checkbox"${c.editable?' checked':''} onchange="updBool(${i},'editable',this.checked)">`;

    const rqChk = isField ? '<span class="dash">—</span>'
      : `<input type="checkbox"${c.required?' checked':''} onchange="updBool(${i},'required',this.checked)">`;

    const itsInp = isCombo
      ? (codes.length
        ? `<select onchange="upd(${i},'items',this.value)">${
            ['', ...codes].map(cd =>
              `<option value="${cd}"${c.items === cd ? ' selected' : ''}>${cd || '—'}</option>`
            ).join('')
          }</select>`
        : `<input type="text" value="${xe(c.items)}" oninput="upd(${i},'items',this.value)">`)
      : '<span class="dash">—</span>';

    const srchChk = isField ? '<span class="dash">—</span>'
      : `<input type="checkbox"${c.search?' checked':''} onchange="updBool(${i},'search',this.checked)">`;

    return `<tr>
      <td class="tn">${i+1}</td>
      <td class="tdl"><button class="btn btn-danger btn-icon" onclick="deleteCol(${i})">×</button></td>
      <td class="tck">${srchChk}</td>
      <td class="ttag">${tagSel}</td>
      <td class="thdr">${hdrInp}</td>
      <td class="tfld">${fldInp}</td>
      <td class="tw">${widInp}</td>
      <td class="tal">${alSel}</td>
      <td class="tit">${itsInp}</td>
      <td class="tck">${edChk}</td>
      <td class="tck">${rqChk}</td>
    </tr>`;
  }).join('');
}

function xe(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── GENERATE ── */
function generate() {
  if (!cols.length) { alert('컬럼을 먼저 입력하세요.'); return; }

  const gridId   = 'gridPanel';
  const provider = '{{resultList}}';
  const moduleName = document.getElementById('inp-module').value.trim();
  const capModule  = moduleName ? moduleName.charAt(0).toUpperCase() + moduleName.slice(1) : 'Module';
  const kebabModule = moduleName
    ? moduleName.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase()
    : 'module';
  const moduleId = `es-${kebabModule}-list`;
  const findId   = 'find' + capModule + 'List';
  const saveId   = 'save' + capModule;
  const deleteId = 'delete' + capModule;
  const showAdd  = document.getElementById('tb-add').checked;
  const showDel  = document.getElementById('tb-del').checked;
  const showSave = document.getElementById('tb-save').checked;
  const fnAdd    = 'onAdd';
  const fnDel    = 'onDelete';
  const fnSave   = 'onSave';

  const displayCols = cols.filter(c => c.tag !== 'sc-data-field');
  const hiddenCols  = cols.filter(c => c.tag === 'sc-data-field');

  // ── alignment ──
  const tagW = displayCols.length
    ? Math.max(...displayCols.map(c => c.tag.length))
    : 14;

  const attrMaxW = {};
  displayCols.forEach(col => {
    buildAttrs(col).forEach(([k, v]) => {
      const w = dw(`${k}="${v}"`);
      if (!attrMaxW[k] || w > attrMaxW[k]) attrMaxW[k] = w;
    });
  });

  const I12 = '    '; // 4-space indent
  const I16 = '        '; // 8-space indent

  const colLines = displayCols.map(col => {
    const attrs = buildAttrs(col);
    const tag   = col.tag.padEnd(tagW);
    const attrStr = attrs.map(([k, v], j) => {
      const s = `${k}="${v}"`;
      return j < attrs.length - 1 ? pw(s, attrMaxW[k]) : s;
    }).join(' ');

    if (col.tag === 'sc-combobox-column') {
      const contIndent = ' '.repeat(I16.length + 1 + tagW + 1);
      const rawItems = (col.items || '').trim();
      const itemsVal = rawItems.startsWith('{{') ? rawItems
        : rawItems.startsWith('codes.') ? `{{${rawItems.toLowerCase()}}}`
        : `{{codes.${rawItems.toLowerCase()}}}`;
      const comboLine = contIndent + `items="${itemsVal}" display-field="label" value-field="data"`;
      return `${I16}<${tag} ${attrStr}\n${comboLine}></${col.tag}>`;
    }

    return `${I16}<${tag} ${attrStr}></${col.tag}>`;
  });

  // ── toolbar ──
  let toolbarBlock = '';
  if (showAdd || showDel || showSave) {
    const active = [];
    if (showAdd)  active.push([fnAdd,  '추가']);
    if (showDel)  active.push([fnDel,  '삭제']);
    if (showSave) active.push([fnSave, '저장']);
    const maxFnW = Math.max(...active.map(([fn]) => fn.length));
    const btns = active.map(([fn, txt]) =>
      `${I16}<sc-button text="${txt}" on-click="${fn}"${' '.repeat(maxFnW - fn.length)} auth-s></sc-button>`
    );
    toolbarBlock = `${I12}<cc-grid-toolbar>\n${btns.join('\n')}\n${I12}</cc-grid-toolbar>`;
  }

  // ── hidden fields ──
  const allHidden = [
    ...hiddenCols.map(c => c.dataField).filter(Boolean),
  ];
  let fieldsBlock = '';
  if (allHidden.length) {
    const fl = allHidden.map(f => `${I16}<sc-data-field data-field="${f}"></sc-data-field>`).join('\n');
    fieldsBlock = `${I12}<sc-grid-fields>\n${fl}\n${I12}</sc-grid-fields>`;
  }

  const hasEditable = cols.some(c => c.editable);

  const parts = [
    `<sc-grid id="${gridId}"`,
    ...(hasEditable
      ? [`         data-provider="${provider}"`, `         editable="true">`]
      : [`         data-provider="${provider}">`]),
  ];
  if (toolbarBlock) parts.push(toolbarBlock);
  parts.push(`${I12}<sc-grid-columns>`);
  parts.push(...colLines);
  parts.push(`${I12}</sc-grid-columns>`);
  if (fieldsBlock) parts.push(fieldsBlock);
  parts.push(`</sc-grid>`);

  // ── sc-code-group ──
  let codeGroupBlock = '';
  if (codes.length) {
    const I4 = '    ';
    const codeLines = codes.map((cd, i) => {
      const comment = codeComments[i] ? `${I4}<!-- ${codeComments[i]} -->\n` : '';
      return `${comment}${I4}<sc-code code="${cd}" value="{{codes.${cd.toLowerCase()}}}"></sc-code>`;
    });
    codeGroupBlock = `<!-- 공통 코드 조회 -->\n<sc-code-group>\n${codeLines.join('\n')}\n</sc-code-group>`;
  }

  // ── sc-ajax ──
  const ajaxLines = [
    `<!-- Search -->`,
    `<sc-ajax id="${findId}"`,
    `         url="${findId}.do"`,
    `         body="{{searchParam}}"`,
    `         last-response="{{resultList}}">`,
    `</sc-ajax>`,
  ];
  if (showSave) {
    ajaxLines.push(
      ``,
      `<!-- Save -->`,
      `<sc-ajax id="${saveId}"`,
      `         url="${saveId}.do">`,
      `</sc-ajax>`,
    );
  }
  if (showDel) {
    ajaxLines.push(
      ``,
      `<!-- Delete -->`,
      `<sc-ajax id="${deleteId}"`,
      `         url="${deleteId}.do">`,
      `</sc-ajax>`,
    );
  }
  const ajaxBlock = ajaxLines.join('\n');

  // ── search panel ──
  const searchFieldsets = cols
    .filter(c => c.search && c.tag !== 'sc-data-field')
    .map(col => {
      let inputEl;
      if (col.tag === 'sc-combobox-column') {
        const rawItems = (col.items || '').trim();
        const itemsVal = rawItems.startsWith('{{') ? rawItems
          : rawItems.startsWith('codes.') ? `{{${rawItems.toLowerCase()}}}`
          : `{{codes.${rawItems.toLowerCase()}}}`;
        inputEl = `${I16}<sc-multi-combobox-field value="{{searchParam.${col.dataField}}}" items="${itemsVal}" display-field="label" value-field="data" placeholder="전체"></sc-multi-combobox-field>`;
      } else {
        inputEl = `${I16}<sc-text-field value="{{searchParam.${col.dataField}}}"></sc-text-field>`;
      }
      return `${I12}<cc-fieldset>\n${I16}<sc-label text="${col.headerText}"></sc-label>\n${inputEl}\n${I12}</cc-fieldset>`;
    });
  const searchPanelBlock = [
    `<!-- 검색 박스 -->`,
    `<cc-search-condition-panel on-search="onFindList" on-enter="onFindList">`,
    ...searchFieldsets,
    `</cc-search-condition-panel>`,
  ].join('\n');

  const rawOutput = [codeGroupBlock, ajaxBlock, searchPanelBlock, parts.join('\n')].filter(Boolean).join('\n\n');

  const indented = rawOutput.split('\n').map(l => '        ' + l).join('\n');
  const sc = '<' + 'script>', ec = '</' + 'script>';
  const htmlModule = [
    `<dom-module id="${moduleId}">`,
    '    <style>',
    '        :host {',
    '            @apply(--vbox-layout);',
    '        }',
    '    </style>',
    '',
    '    <template>',
    indented,
    '    </template>',
    '</dom-module>',
  ].join('\n');

  // ── script methods ──
  const I12s = '            ';
  const I16s = '                ';
  const I20s = '                    ';

  const methodLines = [];

  // lifecycle + 조회 (항상 포함)
  methodLines.push(
    '',
    `${I12s}initialized: function() {`,
    `${I16s}var me = this;`,
    `${I16s}me.onFindList();`,
    `${I12s}},`,
    '',
    `${I12s}load: function() {`,
    `${I16s}var me = this;`,
    `${I16s}me.onFindList();`,
    `${I12s}},`,
    '',
    `${I12s}// 조회`,
    `${I12s}onFindList: function () {`,
    `${I16s}var me = this;`,
    `${I16s}UT.request(me.$.${findId});`,
    `${I12s}},`,
  );

  // 추가
  if (showAdd) {
    methodLines.push(
      '',
      `${I12s}// 추가`,
      `${I12s}${fnAdd}: function () {`,
      `${I16s}var me = this,`,
      `${I20s}provider = me.$.gridPanel.getDataProvider();`,
      `${I16s}provider.addItemAt(0);`,
      `${I12s}},`,
    );
  }

  // 저장
  if (showSave) {
    methodLines.push(
      '',
      `${I12s}// 저장`,
      `${I12s}${fnSave}: function () {`,
      `${I16s}var me = this,`,
      `${I20s}provider = me.$.gridPanel.getDataProvider(),`,
      `${I20s}insertItems = provider.getNewItems(),`,
      `${I20s}updateItems = provider.getUpdateItems();`,
      '',
      `${I16s}// 유효성 체크`,
      `${I16s}if (!me.$.gridPanel.validate()) return UT.alert("STD.E9000");`,
      `${I16s}if (insertItems.length + updateItems.length == 0) return UT.alert("STD.N1700");`,
      '',
      `${I16s}// Save?`,
      `${I16s}UT.confirm("STD.N1200", function () {`,
      `${I20s}me.$.${saveId}.body = {insertItems: insertItems, updateItems: updateItems};`,
      `${I20s}UT.request(me.$.${saveId}, (e, res) => {`,
      `${I20s}    var result = res.response;`,
      `${I20s}    if (result.success) {`,
      `${I20s}        UT.alert("STD.N2400");`,
      `${I20s}        me.onFindList();`,
      `${I20s}    } else if (result.duplicate) {`,
      `${I20s}        UT.alert('STD.E9100');`,
      `${I20s}    }`,
      `${I20s}});`,
      `${I16s}});`,
      `${I12s}},`,
    );
  }

  // 삭제
  if (showDel) {
    methodLines.push(
      '',
      `${I12s}// 삭제`,
      `${I12s}${fnDel}: function () {`,
      `${I16s}var me = this,`,
      `${I20s}provider = me.$.gridPanel.getDataProvider(),`,
      `${I20s}checkedItems = provider.selectionCheckedItems();`,
      '',
      `${I16s}if (UT.isEmpty(checkedItems)) return UT.alert("STD.N1700");`,
      '',
      `${I16s}// 삭제하시겠습니까?`,
      `${I16s}UT.confirm("STD.N1300", function () {`,
      `${I20s}me.$.${deleteId}.body = {deleteItems: checkedItems};`,
      `${I20s}UT.request(me.$.${deleteId}, (e, res) => {`,
      `${I20s}    var result = res.response;`,
      `${I20s}    if (result.success) {`,
      `${I20s}        UT.alert("STD.N2500"); // 삭제하였습니다.`,
      `${I20s}        me.onFindList();`,
      `${I20s}    }`,
      `${I20s}});`,
      '',
      `${I16s}});`,
      `${I12s}},`,
    );
  }

  const scriptBlock = [
    '    ' + sc,
    '        Polymer({',
    `            is : "${moduleId}",`,
    '            ',
    '            properties: {',
    '                // 공통 코드',
    '                codes: {',
    '                    type: Object,',
    '                    value: function () {',
    '                        return {};',
    '                    }',
    '                },',
    '',
    '                // 조회 조건',
    '                searchParam: {',
    '                    type: Object,',
    '                    value: function () {',
    '                        return {};',
    '                    }',
    '                },',
    '',
    '                // 결과 리스트',
    '                resultList: {',
    '                    type: Object,',
    '                    value: function () {',
    '                        return {};',
    '                    }',
    '                },',
    '            },',
    ...methodLines,
    '            ',
    '        });',
    '    ' + ec,
  ].join('\n');

  const fullModule = htmlModule.replace('</dom-module>', '\n' + scriptBlock + '\n</dom-module>');

  document.getElementById('out-list-pre').innerHTML = hlXml(fullModule);

  // ── em module ──
  const sc2 = '<' + 'script>', ec2 = '</' + 'script>';
  const listModuleId   = `es-${kebabModule}-list`;
  const detailModuleId = `es-${kebabModule}-detail`;
  const emModuleId     = `em-${kebabModule}`;

  const emModule = [
    `<sc-link rel="import" href="${listModuleId}.html"></sc-link>`,
    `<sc-link rel="import" href="${detailModuleId}.html"></sc-link>`,
    ``,
    `<dom-module id="${emModuleId}">`,
    `    <style>`,
    `        :host {`,
    `            @apply(--vbox-layout);`,
    `        }`,
    `    </style>`,
    ``,
    `    <template>`,
    `        <cc-page-title-bar></cc-page-title-bar>`,
    ``,
    `        <sc-pages id="pages" class="fit">`,
    `            <${listModuleId} id="list" on-show-detail="onShowDetail"></${listModuleId}>`,
    `            <template>`,
    `                <${detailModuleId} id="detail" on-close="onShowList"></${detailModuleId}>`,
    `            </template>`,
    `        </sc-pages>`,
    `    </template>`,
    ``,
    `    ` + sc2,
    `        Polymer({`,
    `            is : "${emModuleId}",`,
    ``,
    `            onShowDetail: function(e, data) {`,
    `                var me = this;`,
    `                me.$.pages.selectItem(me.$.detail);`,
    `                me.$.detail.load(data);`,
    `            },`,
    ``,
    `            onShowList: function(e, data){`,
    `                var me = this;`,
    ``,
    `                me.$.pages.selectItem(me.$.list);`,
    `                if(data.isSuccess) {`,
    `                    me.$.list.load();`,
    `                }`,
    `            }`,
    `        });`,
    `    ` + ec2,
    `</dom-module>`,
  ].join('\n');

  document.getElementById('out-em-pre').innerHTML = hlXml(emModule);
}

/* ── BUILD ATTRS ── */
function buildAttrs(col) {
  const a = [];
  if (col.tag === 'sc-data-field') {
    a.push(['data-field', col.dataField]);
    return a;
  }
  a.push(['header-text', col.headerText]);
  a.push(['data-field', col.dataField]);
  a.push(['width', col.width || '100']);
  if (col.tag !== 'sc-date-column') {
    a.push(['text-align', col.tag === 'sc-combobox-column' ? 'center' : (col.textAlign || 'center')]);
  }
  if (col.editable) a.push(['editable', 'true']);
  if (col.required) a.push(['required', 'true']);
  if (col.tag === 'sc-date-column') {
    a.push(['value-format', 'yyyy-MM-dd']);
  }
  return a;
}

/* ── DISPLAY WIDTH (Korean = 2 chars wide) ── */
function dw(s) {
  let w = 0;
  for (const c of s) w += c.charCodeAt(0) > 0x7F ? 2 : 1;
  return w;
}

function pw(s, targetW) {
  return s + ' '.repeat(Math.max(0, targetW - dw(s)));
}

/* ── SYNTAX HIGHLIGHT ── */
function hlXml(raw) {
  // Tokenize raw XML first, then escape+colorize each token separately.
  // This prevents span-inserted HTML from being re-matched by later regexes.
  const TAG = /<(\/?)(\w[\w-]*)([^>]*)>/g;
  const out = [];
  let last = 0, m;
  while ((m = TAG.exec(raw)) !== null) {
    if (m.index > last) out.push(he(raw.slice(last, m.index)));
    const [, slash, name, attrs] = m;
    out.push(
      `<span class="xp">&lt;${slash}</span><span class="xt">${he(name)}</span>` +
      colorAttrs(attrs) +
      `<span class="xp">&gt;</span>`
    );
    last = m.index + m[0].length;
  }
  if (last < raw.length) out.push(he(raw.slice(last)));
  return out.join('');
}

function he(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function colorAttrs(s) {
  if (!s) return '';
  return s.replace(/([\w-]+)="([^"]*)"|(\S+)/g, (_, k, v, bare) =>
    k !== undefined
      ? ` <span class="xa">${he(k)}</span><span class="xp">="</span><span class="xv">${he(v)}</span><span class="xp">"</span>`
      : ` <span class="xa">${he(bare)}</span>`
  );
}

/* ── RESET ── */
function resetAll() {
  document.getElementById('inp-module').value       = '';
  document.getElementById('inp-fields').value       = '';
  document.getElementById('inp-headers').value      = '';
  document.getElementById('inp-codes').value        = '';
  document.getElementById('inp-code-comments').value = '';
  document.getElementById('tb-add').checked  = true;
  document.getElementById('tb-del').checked  = true;
  document.getElementById('tb-save').checked = true;
  cols = [];
  codes = [];
  codeComments = [];
  renderTable();
  const placeholder = '코드 생성 버튼을 클릭하세요...';
  ['em', 'list', 'detail', 'popup'].forEach(t => {
    const el = document.getElementById('out-' + t + '-pre');
    el.innerHTML = placeholder;
    el.style.color = 'var(--muted)';
    el.style.fontStyle = 'italic';
  });
}

/* ── SAMPLE ── */
function loadSample() {
  document.getElementById('inp-module').value = 'module';
  document.getElementById('inp-fields').value =
    'user_id\nuser_name\nemail\nphone_no\nstatus_cd\nreg_dt\nupd_dt';
  document.getElementById('inp-headers').value =
    '사용자 ID\n사용자 이름\n이메일\n전화번호\n상태 코드\n등록일시\n수정일시';
  document.getElementById('inp-codes').value = 'A001\nB001\nC001';
  document.getElementById('inp-code-comments').value = 'A001\nB001\nC001';
  parseCodes();
  parseInput();
  cols.forEach(c => {
    if (c.dataField === 'status_cd') c.tag = 'sc-combobox-column';
    if (c.dataField === 'reg_dt' || c.dataField === 'upd_dt') c.tag = 'sc-date-column';
  });
  renderTable();
  generate();
}

/* ── OUTPUT TABS ── */
function switchOutTab(name, el) {
  document.querySelectorAll('.out-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('out-em').style.display     = name === 'em'     ? '' : 'none';
  document.getElementById('out-list').style.display   = name === 'list'   ? '' : 'none';
  document.getElementById('out-detail').style.display = name === 'detail' ? '' : 'none';
  document.getElementById('out-popup').style.display  = name === 'popup'  ? '' : 'none';
}

/* ── COPY ── */
function copyOutput() {
  const active = document.querySelector('.out-tab.active').textContent.trim();
  const el = document.getElementById(`out-${active}-pre`);
  const text = el ? el.textContent : '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
}
